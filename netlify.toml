[build]
command = "npm run build"
publish = ".next"
functions = "api"

[build.environment]
NODE_VERSION = "20"
NODE_ENV = "production"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/api/*"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
